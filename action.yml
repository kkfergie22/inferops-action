name: "InferOps CI Failure Analyzer"
description: "Analyze CI/CD failures and suggest fixes using AI"

inputs:
  github_token:
    description: "GitHub Token"
    required: true
  openai_api_key:
    description: "OpenAI API Key"
    required: false
  gemini_api_key:
    description: "Google Gemini API Key"
    required: false
  llm_provider:
    description: "Which LLM to use: openai or gemini"
    required: false
    default: "openai"
  llm_model:
    description: "Model to use (e.g. gpt-4o-mini). Defaults to provider defaults if empty."
    required: false
    default: ""
  discord_webhook_url:
    description: "Discord incoming webhook URL"
    required: false
  slack_webhook_url:
    description: "Slack incoming webhook URL"
    required: false
  suggest_patch:
    description: "Enable patch suggestion (stretch goal)"
    required: false
    default: "false"
  max_log_lines:
    description: "Max log lines sent to LLM per job"
    required: false
    default: "200"

runs:
  using: "docker"
  image: "Dockerfile"
  env:
    INPUT_GITHUB_TOKEN: ${{ inputs.github_token }}
    INPUT_OPENAI_API_KEY: ${{ inputs.openai_api_key }}
    INPUT_GEMINI_API_KEY: ${{ inputs.gemini_api_key }}
    INPUT_LLM_PROVIDER: ${{ inputs.llm_provider }}
    INPUT_LLM_MODEL: ${{ inputs.llm_model }}
    INPUT_DISCORD_WEBHOOK_URL: ${{ inputs.discord_webhook_url }}
    INPUT_SLACK_WEBHOOK_URL: ${{ inputs.slack_webhook_url }}
    INPUT_SUGGEST_PATCH: ${{ inputs.suggest_patch }}
    INPUT_MAX_LOG_LINES: ${{ inputs.max_log_lines }}
