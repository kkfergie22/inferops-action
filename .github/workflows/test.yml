# .github/workflows/test.yml
name: Test InferOps

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Force failure
        run: exit 1

      - name: Run InferOps
        if: failure()
        uses: ./
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          llm_provider: "openai"
          discord_webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
